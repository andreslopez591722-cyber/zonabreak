<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>Zona Break — Menú</title>
  <meta name="description" content="Zona Break · Cocina urbana de calidad. Hamburguesas, perros, picadas y más." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/brand.css" />
  <style>
    /* ── HERO ─────────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 52px 20px 36px;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,162,39,.14), transparent);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content:'';
      position:absolute;
      inset:0;
      background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1200&q=40') center/cover no-repeat;
      opacity:.06;
      pointer-events:none;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 10vw, 5rem);
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f5f0e8 30%, var(--zb-gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      position: relative;
    }
    .hero-sub {
      color: var(--zb-muted);
      margin-top: 10px;
      font-size: .95rem;
      position: relative;
    }
    .hero-badge {
      display: inline-block;
      margin-top: 16px;
      padding: 6px 18px;
      border: 1px solid rgba(201,162,39,.4);
      border-radius: 999px;
      font-size: .75rem;
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--zb-gold2);
      position: relative;
    }

    /* ── MÉTODO DE PAGO ───────────────────────────────────── */
    .pay-btn {
      padding: 10px 8px;
      border-radius: 10px;
      border: 1px solid rgba(201,162,39,.25);
      background: transparent;
      color: var(--zb-muted);
      font-family: var(--font-display);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .04em;
      cursor: pointer;
      transition: all .2s;
    }
    .pay-btn.active, .pay-btn:hover {
      background: var(--zb-gold);
      color: var(--zb-black);
      border-color: var(--zb-gold);
      font-weight: 700;
    }

    /* ── CATEGORÍAS ────────────────────────────────────────── */
    .cats {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 14px 16px;
      scrollbar-width: none;
      position: sticky;
      top: 60px;
      z-index: 90;
      background: rgba(10,10,12,.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(201,162,39,.1);
    }
    .cats::-webkit-scrollbar { display:none; }
    .cat-btn {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 999px;
      border: 1px solid rgba(201,162,39,.25);
      background: transparent;
      color: var(--zb-muted);
      font-family: var(--font-display);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .cat-btn.on, .cat-btn:hover {
      background: var(--zb-gold);
      color: var(--zb-black);
      border-color: var(--zb-gold);
    }

    /* ── GRID PRODUCTOS ───────────────────────────────────── */
    .section-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--zb-gold2);
      margin: 28px 0 14px;
      padding-left: 4px;
      border-left: 3px solid var(--zb-gold);
      padding-left: 12px;
    }
    .prod-card {
      background: var(--zb-black2);
      border: 1px solid rgba(201,162,39,.1);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .22s, border-color .22s, box-shadow .22s;
      position: relative;
    }
    .prod-card:hover {
      transform: translateY(-3px);
      border-color: rgba(201,162,39,.4);
      box-shadow: 0 12px 36px rgba(0,0,0,.5);
    }
    .prod-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: var(--zb-black3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .prod-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .prod-info {
      padding: 12px;
    }
    .prod-name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1rem;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .prod-desc {
      color: var(--zb-muted);
      font-size: .73rem;
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .prod-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .prod-price {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.1rem;
      color: var(--zb-gold2);
    }
    .btn-add {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--zb-gold), var(--zb-gold2));
      color: var(--zb-black);
      font-size: 1.2rem;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s, box-shadow .15s;
      line-height: 1;
    }
    .btn-add:hover { transform: scale(1.12); box-shadow: 0 4px 14px rgba(201,162,39,.5); }

    /* ── CARRITO FAB ──────────────────────────────────────── */
    .fab-cart {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--zb-gold), var(--zb-gold2));
      color: var(--zb-black);
      font-size: 1.5rem;
      box-shadow: 0 8px 28px rgba(201,162,39,.5);
      z-index: 150;
      transition: transform .2s;
    }
    .fab-cart:hover { transform: scale(1.07); }
    .cart-count {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--zb-danger);
      color: #fff;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: .65rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }

    /* ── DRAWER CARRITO ───────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 200;
      display: none;
      opacity: 0;
      transition: opacity .3s;
    }
    .overlay.open { display: flex; align-items: flex-end; justify-content: center; opacity: 1; }
    .drawer {
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      background: var(--zb-black2);
      border: 1px solid rgba(201,162,39,.25);
      border-radius: 18px 18px 0 0;
      padding: 20px;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.22,1,.36,1);
    }
    .overlay.open .drawer { transform: translateY(0); }
    .drawer-handle {
      width: 40px;
      height: 4px;
      background: rgba(255,255,255,.15);
      border-radius: 2px;
      margin: 0 auto 18px;
    }
    .drawer-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--zb-gold2);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .cart-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      font-size: .9rem;
      gap: 10px;
    }
    .cart-line-name { flex: 1; }
    .cart-ctrl {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ctrl-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(201,162,39,.35);
      background: transparent;
      color: var(--zb-gold2);
      cursor: pointer;
      font-weight: 700;
      font-size: .9rem;
    }
    .cart-price {
      font-family: var(--font-display);
      font-weight: 800;
      color: var(--zb-gold2);
      min-width: 70px;
      text-align: right;
    }
    .cart-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(201,162,39,.2);
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 900;
    }

    /* ── EMPTY ────────────────────────────────────────────── */
    .empty { text-align:center; padding: 60px 20px; color: var(--zb-muted); }
    .empty span { font-size: 3rem; display: block; margin-bottom: 12px; }
  </style>
</head>
<body>

  <header class="zb-header">
    <span class="zb-logo">Zona Break</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <a href="/pos.html" class="zb-btn zb-btn-ghost" style="padding:7px 13px;font-size:.72rem;">POS</a>
      <a href="/admin.html" class="zb-btn zb-btn-ghost" style="padding:7px 13px;font-size:.72rem;">Admin</a>
    </div>
  </header>

  <section class="hero zb-animate">
    <h1 class="hero-title">Cocina Urbana</h1>
    <p class="hero-sub">La calle tiene sabor · Pide aquí</p>
    <span class="hero-badge">🔥 Menú digital</span>
  </section>

  <!-- Categorías -->
  <nav class="cats" id="cats"></nav>

  <main style="max-width:1100px;margin:0 auto;padding:4px 16px 100px;">
    <div id="menu"></div>
  </main>

  <!-- FAB carrito -->
  <button type="button" class="fab-cart" id="fab" aria-label="Carrito">
    🛒
    <span class="cart-count" id="cartCount">0</span>
  </button>

  <!-- Overlay + Drawer -->
  <div class="overlay" id="overlay">
    <div class="drawer" id="drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-title">Tu pedido</div>
      <div id="cartLines"></div>
      <div class="cart-total-row">
        <span>Total</span>
        <span class="text-gold" id="cartTotal">$0</span>
      </div>

      <div style="margin-top:18px;display:grid;gap:10px;">
        <label class="text-muted" style="font-size:.78rem;">Tu nombre</label>
        <input class="zb-input" id="cName" placeholder="¿Cómo te llamas?" />
        <label class="text-muted" style="font-size:.78rem;">WhatsApp (opcional)</label>
        <input class="zb-input" id="cPhone" placeholder="Ej: 3001234567" />
        <label class="text-muted" style="font-size:.78rem;">Notas / observaciones</label>
        <input class="zb-input" id="cNotes" placeholder="Sin cebolla, extra salsa..." />
        <label class="text-muted" style="font-size:.78rem;">Método de pago</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;" id="payMethods">
          <button type="button" class="pay-btn active" data-pay="Efectivo">💵 Efectivo</button>
          <button type="button" class="pay-btn" data-pay="Tarjeta">💳 Tarjeta</button>
          <button type="button" class="pay-btn" data-pay="Nequi">📱 Nequi</button>
          <button type="button" class="pay-btn" data-pay="Daviplata">📲 Daviplata</button>
        </div>
      </div>

      <div style="margin-top:18px;display:grid;gap:10px;">
        <button type="button" class="zb-btn zb-btn-primary" id="btnOrder" style="width:100%;">
          Enviar pedido
        </button>
        <p class="text-muted" style="font-size:.72rem;text-align:center;">
          También puedes enviar directamente por WhatsApp:
        </p>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <a class="zb-btn zb-btn-ghost" id="waCocina" target="_blank" style="padding:9px;font-size:.68rem;text-align:center;text-decoration:none;">🍳 Cocina</a>
          <a class="zb-btn zb-btn-ghost" id="waCaja"   target="_blank" style="padding:9px;font-size:.68rem;text-align:center;text-decoration:none;">💰 Caja</a>
          <a class="zb-btn zb-btn-ghost" id="waAdmin"  target="_blank" style="padding:9px;font-size:.68rem;text-align:center;text-decoration:none;">👤 Admin</a>
        </div>
      </div>

      <div style="margin-top:12px;">
        <button type="button" class="zb-btn zb-btn-ghost" id="btnClose" style="width:100%;font-size:.8rem;">Seguir viendo el menú</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script src="/components/toast.js"></script>
  <script>
    const CAT_LABELS = {
      hamburguesas: '🍔 Hamburguesas',
      perros:       '🌭 Perros Calientes',
      sandwiches:   '🥪 Sándwiches',
      picadas:      '🍖 Picadas',
      asados:       '🥩 Asados',
      extras:       '🍟 Extras',
      bebidas:      '🥤 Bebidas',
      cocteles:     '🍸 Cocteles',
      sinAlcohol:   '🥥 Sin Alcohol',
    };

    let products = [];
    let cart = [];
    let wa = { cocina:'', caja:'', admin:'' };
    let activecat = 'todos';
    let selectedPay = 'Efectivo';

    // Selección de método de pago
    document.getElementById('payMethods').addEventListener('click', e => {
      const btn = e.target.closest('.pay-btn');
      if (!btn) return;
      document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPay = btn.dataset.pay;
    });

    function fmt(n) { return '$' + Math.round(n).toLocaleString('es-CO'); }

    function waHref(num, text) {
      const n = String(num||'').replace(/\D/g,'');
      return n ? 'https://wa.me/'+n+'?text='+encodeURIComponent(text) : '#';
    }

    function buildWaMsg() {
      const lines = cart.map(c => '• '+c.qty+'× '+c.name+'  '+fmt(c.price*c.qty)).join('\n');
      const total = cart.reduce((s,c)=>s+c.price*c.qty,0);
      const nombre = document.getElementById('cName').value || 'Cliente';
      const notas  = document.getElementById('cNotes').value;
      return '🍔 *ZONA BREAK — PEDIDO*\n'+
             '👤 '+nombre+'\n'+
             '💳 Pago: '+selectedPay+'\n'+
             '──────────────────\n'+
             lines+'\n'+
             '──────────────────\n'+
             '*TOTAL: '+fmt(total)+'*'+
             (notas ? '\n📝 '+notas : '');
    }

    function updateWaLinks() {
      const msg = buildWaMsg();
      document.getElementById('waCocina').href = waHref(wa.cocina, msg);
      document.getElementById('waCaja').href   = waHref(wa.caja,   msg);
      document.getElementById('waAdmin').href  = waHref(wa.admin,  msg);
    }

    // ── RENDER CARRITO ──────────────────────────────────────
    function renderCart() {
      const total = cart.reduce((s,c)=>s+c.price*c.qty,0);
      const count = cart.reduce((s,c)=>s+c.qty,0);
      const countEl = document.getElementById('cartCount');
      countEl.textContent = count;
      countEl.style.display = count ? 'flex' : 'none';
      document.getElementById('cartTotal').textContent = fmt(total);

      document.getElementById('cartLines').innerHTML = cart.length
        ? cart.map(c => `
          <div class="cart-line">
            <span class="cart-line-name">${c.emoji} ${c.name}</span>
            <div class="cart-ctrl">
              <button type="button" class="ctrl-btn" data-m="${c._id}">−</button>
              <span>${c.qty}</span>
              <button type="button" class="ctrl-btn" data-p="${c._id}">+</button>
            </div>
            <span class="cart-price">${fmt(c.price*c.qty)}</span>
          </div>`)
          .join('')
        : '<div class="empty"><span>🛒</span><p>El carrito está vacío</p></div>';

      document.getElementById('cartLines').onclick = (e) => {
        const m = e.target.dataset.m;
        const p = e.target.dataset.p;
        const id = m || p;
        if (!id) return;
        const item = cart.find(c=>c._id===id);
        if (!item) return;
        if (m) item.qty--;
        if (p) item.qty++;
        cart = cart.filter(c=>c.qty>0);
        renderCart();
      };
      updateWaLinks();
    }

    function addToCart(prod) {
      const ex = cart.find(c=>c._id===prod._id);
      if (ex) ex.qty++;
      else cart.push({...prod, qty:1});
      renderCart();
      showToast('Agregado: '+prod.name);
    }

    // ── RENDER MENÚ ─────────────────────────────────────────
    function getCategories() {
      const cats = [...new Set(products.map(p=>p.category))];
      return cats.sort((a,b)=>{
        const ord = Object.keys(CAT_LABELS);
        return (ord.indexOf(a)||99) - (ord.indexOf(b)||99);
      });
    }

    function renderCats() {
      const cats = getCategories();
      const nav = document.getElementById('cats');
      nav.innerHTML =
        `<button class="cat-btn on" data-cat="todos">🍽️ Todo</button>` +
        cats.map(c=>`<button class="cat-btn" data-cat="${c}">${CAT_LABELS[c]||c}</button>`).join('');
      nav.onclick = (e) => {
        const btn = e.target.closest('.cat-btn');
        if (!btn) return;
        activecat = btn.dataset.cat;
        document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('on', b===btn));
        renderMenu();
      };
    }

    function renderMenu() {
      const visible = activecat==='todos' ? products : products.filter(p=>p.category===activecat);
      if (!visible.length) {
        document.getElementById('menu').innerHTML = '<div class="empty"><span>😔</span><p>Sin productos en esta categoría</p></div>';
        return;
      }

      if (activecat !== 'todos') {
        const label = CAT_LABELS[activecat] || activecat;
        document.getElementById('menu').innerHTML =
          `<h2 class="section-title">${label}</h2>
           <div class="grid-products" id="grid-${activecat}"></div>`;
        const grid = document.getElementById(`grid-${activecat}`);
        grid.innerHTML = visible.map(p=>cardHtml(p)).join('');
      } else {
        const cats = getCategories();
        document.getElementById('menu').innerHTML = cats.map(cat=>{
          const catProds = products.filter(p=>p.category===cat);
          if (!catProds.length) return '';
          return `<h2 class="section-title">${CAT_LABELS[cat]||cat}</h2>
                  <div class="grid-products">${catProds.map(p=>cardHtml(p)).join('')}</div>`;
        }).join('');
      }

      document.getElementById('menu').onclick = (e) => {
        const btn = e.target.closest('.btn-add');
        if (!btn) return;
        const id = btn.dataset.id;
        const prod = products.find(p=>p._id===id);
        if (prod) addToCart(prod);
      };
    }

    function cardHtml(p) {
      const imgContent = p.imageUrl
        ? `<img src="${p.imageUrl}" alt="${p.name}" loading="lazy" />`
        : `<span style="font-size:3.2rem;">${p.emoji||'🍽️'}</span>`;
      return `
        <div class="prod-card zb-animate">
          <div class="prod-img">${imgContent}</div>
          <div class="prod-info">
            <div class="prod-name">${p.name}</div>
            <div class="prod-desc">${p.description||''}</div>
            <div class="prod-footer">
              <span class="prod-price">${fmt(p.price)}</span>
              <button type="button" class="btn-add" data-id="${p._id}" aria-label="Agregar ${p.name}">+</button>
            </div>
          </div>
        </div>`;
    }

    // ── PEDIDO VÍA API ──────────────────────────────────────
    document.getElementById('btnOrder').onclick = async () => {
      if (!cart.length) { showToast('El carrito está vacío', 'err'); return; }
      const btn = document.getElementById('btnOrder');
      btn.disabled = true; btn.textContent = 'Enviando…';
      try {
        const subtotal = cart.reduce((s,c)=>s+c.price*c.qty,0);
        await fetch('/api/orders', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            source:'web',
            channel:'menu_web',
            customerName: document.getElementById('cName').value||'Cliente web',
            customerPhone: document.getElementById('cPhone').value||'',
            notes: document.getElementById('cNotes').value||'',
            items: cart.map(c=>({productId:c._id,name:c.name,price:c.price,qty:c.qty,emoji:c.emoji||''})),
            subtotal,
            serviceCharge:0,
            total:subtotal,
            status:'pending',
            createdBy:'Menu Web',
          }),
        });
        showToast('✅ ¡Pedido enviado!');
        cart = [];
        renderCart();
        ['cName','cPhone','cNotes'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
        document.getElementById('overlay').classList.remove('open');
      } catch(e) {
        showToast('Error al enviar: '+e.message, 'err');
      } finally {
        btn.disabled=false; btn.textContent='Enviar pedido';
      }
    };

    // ── OVERLAY CARRITO ──────────────────────────────────────
    document.getElementById('fab').onclick = () => {
      document.getElementById('overlay').classList.add('open');
      updateWaLinks();
    };
    document.getElementById('btnClose').onclick = () => {
      document.getElementById('overlay').classList.remove('open');
    };
    document.getElementById('overlay').onclick = (e) => {
      if (e.target === document.getElementById('overlay'))
        document.getElementById('overlay').classList.remove('open');
    };

    // ── INIT ───────────────────────────────────────────────
    async function load() {
      try {
        const [prods, cfg] = await Promise.all([
          fetch('/api/products').then(r=>r.json()),
          fetch('/api/public/config').then(r=>r.json()).catch(()=>({whatsapp:{}})),
        ]);
        products = prods;
        wa = cfg.whatsapp || {};
        renderCats();
        renderMenu();
      } catch(e) {
        document.getElementById('menu').innerHTML =
          '<div class="empty"><span>⚠️</span><p>No se pudo cargar el menú. Verifica que el servidor esté corriendo.</p></div>';
      }
    }

    load();
